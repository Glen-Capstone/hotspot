<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Mikrotik Hotspot Login page</title>

    <!-- Bootstrap core CSS from GitHub Pages -->
    <link href="https://glen-capstone.github.io/hotspot/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://glen-capstone.github.io/hotspot/css/bootstrap-theme.css" rel="stylesheet">
</head>

<body role="document">
$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post">
    <input type="hidden" name="username" />
    <input type="hidden" name="password" />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <input type="hidden" name="popup" value="true" />
</form>

<script type="text/javascript" src="/md5.js"></script>
<script type="text/javascript">
    function doLogin() {
        document.sendin.username.value = document.login.username.value;
        document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
        document.sendin.submit();
        return false;
    }
</script>
$(endif)

<!-- Fixed navbar -->
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="#">HotSpot Service</a>
        </div>
    </div>
</nav>

<div class="container theme-showcase" role="main">

    <div class="jumbotron">
        <h1>Welcome to Mikrotik Hotspot</h1>
        <p>Please put your username and password below to use our internet service</p>
    </div>

    $(if error)
    <div class="alert alert-danger">
        $(error)
    </div>
    $(endif)

    <div class="row">
    <div class="col-sm-10 col-sm-offset-1 col-md-8 col-md-offset-2">
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">Internet Login Field</h3>
        </div>
        <div class="panel-body">
            <form name="login" action="$(link-login-only)" method="post"
                $(if chap-id) onSubmit="return doLogin()" $(endif)>
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input type="hidden" name="popup" value="true" />

                <div class="input-group">
                    <span class="input-group-addon"><i class="glyphicon glyphicon-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Username" value="$(username)">
                </div>
                <br>
                <div class="input-group">
                    <span class="input-group-addon"><i class="glyphicon glyphicon-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password">
                </div>
                <br>
                <input type="submit" class="btn-block btn btn-primary" value="Login">
                <br>
                <a href="voucher-login.html">Login using Voucher</a>
            </form>
        </div>
    </div>
    </div>
    </div>

    <footer class="well">
        <div class="container">
            <p class="text-muted"></p>
        </div>
    </footer>

</div>

<script src="https://glen-capstone.github.io/hotspot/js/jquery-1.12.2.min.js"></script>
<script>window.jQuery || document.write('<script src="/js/jquery-1.12.2.min.js"><\/script>')</script>
<script src="https://glen-capstone.github.io/hotspot/js/bootstrap.min.js"></script>
</body>
</html>
