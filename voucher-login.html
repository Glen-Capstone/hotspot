<!--voucher-login.html-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Mikrotik Hotspot Login page</title>

    <!-- Tailwind CSS (compiled) from GitHub Pages -->
    <link href="https://glen-capstone.github.io/hotspot/css/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen">
$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post">
    <input type="hidden" name="username" />
    <input type="hidden" name="password" />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <input type="hidden" name="popup" value="true" />
</form>

<script type="text/javascript" src="https://glen-capstone.github.io/hotspot/md5.js"></script>
<script type="text/javascript">
    function doLogin() {
        document.sendin.username.value = document.login.username.value;
        document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
        document.sendin.submit();
        return false;
    }
</script>
$(endif)

<!-- Fixed navbar -->
<nav class="bg-gray-900 text-white fixed top-0 left-0 right-0 z-10 shadow">
    <div class="max-w-5xl mx-auto px-4 py-3">
        <a class="font-semibold text-lg" href="#">HotSpot Service</a>
    </div>
</nav>

<div class="max-w-5xl mx-auto px-4 pt-20 pb-10">

    <div class="bg-white rounded-lg shadow p-8 mb-6 text-center">
        <h1 class="text-3xl font-bold">Welcome to Mikrotik Hotspot</h1>
    </div>

    $(if error)
    <div class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded mb-6">
        $(error)
    </div>
    $(endif)

    <div class="flex justify-center">
    <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="bg-gray-50 px-6 py-4 border-b">
            <h3 class="font-semibold text-lg">Voucher Login</h3>
        </div>
        <div class="p-6">
            <form name="login" action="$(link-login-only)" method="post"
                $(if chap-id) onSubmit="return doLogin()" $(endif)>
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input type="hidden" name="popup" value="true" />

                <div class="flex items-center border rounded mb-4">
                    <span class="px-3 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    <input type="text" name="username" class="w-full py-2 px-2 rounded-r outline-none" placeholder="Username" value="$(username)">
                </div>

                <input type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded cursor-pointer" value="Login">

                <div class="text-center mt-4">
                    <a href="login.html" class="text-blue-600 hover:underline text-sm">Login using Username</a>
                </div>
            </form>
        </div>
    </div>
    </div>
    </div>

    <footer class="text-center text-gray-400 text-sm mt-10">
        <p></p>
    </footer>

</div>

</body>
</html>
